# ===== 服务器配置 =====
server.port=${PORT:8080}
server.servlet.session.timeout=30m

# ===== SQLite 数据库 =====
spring.datasource.url=${DB_PATH:jdbc:sqlite:E:/mc-archive-hub/data/mcarchive.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== 文件上传 =====
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ===== 邮件发送 =====
# 通过环境变量或 application-local.properties 配置
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=true

# ===== 自定义配置 =====
app.base-url=${BASE_URL:http://localhost:8080}
app.upload.dir=${UPLOAD_DIR:E:/mc-archive-uploads}
