<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="description" content="MC Archive Hub — Minecraft 存档分享平台。">
<meta name="theme-color" content="#3a8f3a">
<title>MC Archive Hub — Minecraft 存档分享平台</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">

<!-- Inline SVG sprite for icons -->
<svg style="display:none" aria-hidden="true">
  <defs>
    <!-- Sun -->
    <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </symbol>
    <!-- Moon -->
    <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </symbol>
    <!-- Plus -->
    <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M12 5v14M5 12h14"/>
    </symbol>
    <!-- Search -->
    <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/>
    </symbol>
    <!-- Heart -->
    <symbol id="icon-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
    </symbol>
    <!-- Bookmark -->
    <symbol id="icon-bookmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
    </symbol>
    <!-- Download -->
    <symbol id="icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
    </symbol>
    <!-- Arrow Left -->
    <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </symbol>
    <!-- User -->
    <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </symbol>
    <!-- Globe (MC) -->
    <symbol id="icon-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
    </symbol>
    <!-- Category -->
    <symbol id="icon-category" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </symbol>
    <!-- Version -->
    <symbol id="icon-version" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/>
    </symbol>
    <!-- Loader -->
    <symbol id="icon-loader" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 2v6h-6M3 12a9 9 0 0115.36-6.36L21 8M3 22v-6h6M21 12a9 9 0 01-15.36 6.36L3 16"/>
    </symbol>
    <!-- Coin / Sponsor -->
    <symbol id="icon-coin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><path d="M12 6v12M9.5 9.5C9.5 8.12 10.62 7 12 7s2.5 1.12 2.5 2.5S13.38 12 12 12s-2.5 1.12-2.5 2.5 1.12 2.5 2.5 2.5"/>
    </symbol>
    <!-- Mail -->
    <symbol id="icon-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
    </symbol>
    <!-- Thumbs Down -->
    <symbol id="icon-thumbs-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M10 15v4a2 2 0 002 2l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10zm4 0h5.5a2 2 0 002-2.5l-2.5-7A2 2 0 0017.28 4H14"/>
    </symbol>
  </defs>
</svg>
</head>
<body>

<!-- ===== Header ===== -->
<header class="header">
  <div class="header-inner">
    <a class="logo" href="#" onclick="MC.navigate('home')" aria-label="MC Archive Hub 首页">
      <div class="logo-icon">M</div>
      <span class="logo-text">MC Archive Hub</span>
    </a>

    <!-- Mobile hamburger -->
    <button class="hamburger-btn" id="hamburger-btn" onclick="MC.toggleMobileNav()" aria-label="菜单" title="菜单">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav-links" id="nav-links" aria-label="主导航">
      <!-- Search -->
      <div class="header-search" id="header-search">
        <svg class="search-icon"><use href="#icon-search"/></svg>
        <input class="search-input" id="search-input" type="text"
          placeholder="搜索存档..."
          aria-label="搜索存档"
          onkeydown="if(event.key==='Enter')MC.doSearch()">
        <button class="search-clear hidden" id="search-clear"
          onclick="MC.clearSearch()" aria-label="清除搜索">&times;</button>
      </div>

      <button class="nav-link active" data-nav="home" onclick="MC.navigate('home')">发现</button>
      <button class="nav-link" data-nav="authors" onclick="MC.openAuthorSearch()">👥 作者</button>
      <button class="nav-link" data-nav="profile" id="nav-profile"
        onclick="MC.navigate('profile')" style="display:none">我的</button>

      <!-- Guest -->
      <span id="auth-buttons" aria-label="用户操作">
        <button class="btn btn-ghost btn-sm" onclick="MC.openAuthModal('login')">登录</button>
        <button class="btn btn-primary btn-sm" onclick="MC.openAuthModal('register')">注册</button>
      </span>

      <!-- Logged in -->
      <span id="user-menu" class="user-menu hidden">
        <span class="user-name" id="header-username"></span>
        <div class="user-avatar" id="header-avatar"
          onclick="MC.navigate('profile')"
          title="个人主页"></div>
        <button class="btn btn-primary btn-sm" onclick="MC.openUploadModal()">
          <svg width="14" height="14"><use href="#icon-plus"/></svg>
          上传
        </button>
      </span>

      <!-- Theme toggle -->
      <button class="theme-toggle" id="theme-toggle"
        onclick="MC.toggleTheme()"
        aria-label="切换深色/浅色主题"
        title="切换主题">
        <svg id="theme-icon-sun"><use href="#icon-sun"/></svg>
        <svg id="theme-icon-moon" class="hidden"><use href="#icon-moon"/></svg>
      </button>
    </nav>
  </div>
</header>

<!-- ===== Toast Container ===== -->
<div class="toast-container" id="toast-container" aria-live="polite"></div>

<!-- ===== Main Content ===== -->
<main class="main-content" id="main-content"></main>

<!-- ===== Footer ===== -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-text">
      &copy; 2024 MC Archive Hub &mdash; Minecraft 存档分享社区
    </div>
    <div class="footer-links">
      <a class="footer-link" href="#" onclick="MC.openSponsorModal()">⚡ 支持网站</a>
      <a class="footer-link" href="mailto:douking8@outlook.com">
        <svg width="14" height="14"><use href="#icon-mail"/></svg> 联系网站: douking8@outlook.com
      </a>
      <a class="footer-link" href="#" onclick="MC.navigate('home')">发现存档</a>
      <a class="footer-link" href="#" onclick="MC.openUploadModal()">上传存档</a>
    </div>
  </div>
</footer>

<!-- ===== Auth Modal ===== -->
<div class="modal-overlay hidden" id="auth-modal" role="dialog" aria-modal="true">
  <div class="modal" id="auth-modal-content"></div>
</div>

<!-- ===== Upload Modal ===== -->
<div class="modal-overlay hidden" id="upload-modal" role="dialog" aria-modal="true">
  <div class="modal modal-lg" id="upload-modal-content"></div>
</div>

<!-- ===== Sponsor Modal ===== -->
<!-- 由 MC.openSponsorModal() 动态渲染到 auth-modal 中 -->

<!-- ===== Image Lightbox ===== -->
<div class="lightbox-overlay hidden" id="lightbox" onclick="MC.closeLightbox()" role="dialog" aria-modal="true">
  <button class="lightbox-nav lightbox-prev" id="lightbox-prev" onclick="MC.lightboxPrev(event)" aria-label="上一张">&#10094;</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="放大查看" onclick="event.stopPropagation()">
  <button class="lightbox-nav lightbox-next" id="lightbox-next" onclick="MC.lightboxNext(event)" aria-label="下一张">&#10095;</button>
  <button class="lightbox-close" onclick="MC.closeLightbox()" aria-label="关闭">&times;</button>
</div>

<script src="/js/api.js?v=3"></script>
<script src="/js/data.js?v=3"></script>
<script src="/js/ui.js?v=3"></script>
<script src="/js/app.js?v=3"></script>
<script src="/js/enhance.js?v=3"></script>
</body>
</html>
